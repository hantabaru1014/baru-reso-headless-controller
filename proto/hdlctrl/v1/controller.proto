syntax = "proto3";

package hdlctrl.v1;

import "google/protobuf/timestamp.proto";
import "headless/v1/headless.proto";

service ControllerService {
  // ホスト系
  rpc ListHeadlessHost(ListHeadlessHostRequest) returns (ListHeadlessHostResponse);
  rpc GetHeadlessHost(GetHeadlessHostRequest) returns (GetHeadlessHostResponse);
  rpc GetHeadlessHostLogs(GetHeadlessHostLogsRequest) returns (GetHeadlessHostLogsResponse);
  rpc ShutdownHeadlessHost(ShutdownHeadlessHostRequest) returns (ShutdownHeadlessHostResponse);
  rpc KillHeadlessHost(KillHeadlessHostRequest) returns (KillHeadlessHostResponse);
  rpc UpdateHeadlessHostSettings(UpdateHeadlessHostSettingsRequest) returns (UpdateHeadlessHostSettingsResponse);
  rpc RestartHeadlessHost(RestartHeadlessHostRequest) returns (RestartHeadlessHostResponse);
  rpc StartHeadlessHost(StartHeadlessHostRequest) returns (StartHeadlessHostResponse);
  rpc AllowHostAccess(AllowHostAccessRequest) returns (AllowHostAccessResponse);
  rpc DenyHostAccess(DenyHostAccessRequest) returns (DenyHostAccessResponse);
  rpc ListHeadlessHostImageTags(ListHeadlessHostImageTagsRequest) returns (ListHeadlessHostImageTagsResponse);
  rpc DeleteHeadlessHost(DeleteHeadlessHostRequest) returns (DeleteHeadlessHostResponse);
  rpc ListHeadlessHostInstances(ListHeadlessHostInstancesRequest) returns (ListHeadlessHostInstancesResponse);

  // アカウント系
  rpc CreateHeadlessAccount(CreateHeadlessAccountRequest) returns (CreateHeadlessAccountResponse);
  rpc ListHeadlessAccounts(ListHeadlessAccountsRequest) returns (ListHeadlessAccountsResponse);
  rpc DeleteHeadlessAccount(DeleteHeadlessAccountRequest) returns (DeleteHeadlessAccountResponse);
  rpc UpdateHeadlessAccountCredentials(UpdateHeadlessAccountCredentialsRequest) returns (UpdateHeadlessAccountCredentialsResponse);
  rpc GetHeadlessAccountStorageInfo(GetHeadlessAccountStorageInfoRequest) returns (GetHeadlessAccountStorageInfoResponse);
  rpc RefetchHeadlessAccountInfo(RefetchHeadlessAccountInfoRequest) returns (RefetchHeadlessAccountInfoResponse);
  rpc UpdateHeadlessAccountIcon(UpdateHeadlessAccountIconRequest) returns (UpdateHeadlessAccountIconResponse);

  // Cloud系
  rpc FetchWorldInfo(FetchWorldInfoRequest) returns (headless.v1.FetchWorldInfoResponse);
  rpc SearchUserInfo(SearchUserInfoRequest) returns (headless.v1.SearchUserInfoResponse);
  rpc SearchWorlds(SearchWorldsRequest) returns (SearchWorldsResponse);
  rpc GetOwnWorlds(GetOwnWorldsRequest) returns (GetOwnWorldsResponse);
  rpc GetResoniteUser(GetResoniteUserRequest) returns (GetResoniteUserResponse);
  rpc GetFriendRequests(GetFriendRequestsRequest) returns (GetFriendRequestsResponse);
  rpc AcceptFriendRequests(AcceptFriendRequestsRequest) returns (AcceptFriendRequestsResponse);

  // コンタクト・チャット系
  rpc ListContacts(ListContactsRequest) returns (ListContactsResponse);
  rpc GetContactMessages(GetContactMessagesRequest) returns (GetContactMessagesResponse);
  rpc SendContactMessage(SendContactMessageRequest) returns (SendContactMessageResponse);

  // セッション系
  rpc SearchSessions(SearchSessionsRequest) returns (SearchSessionsResponse);
  rpc GetSessionDetails(GetSessionDetailsRequest) returns (GetSessionDetailsResponse);
  rpc StartWorld(StartWorldRequest) returns (StartWorldResponse);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  rpc DeleteEndedSession(DeleteEndedSessionRequest) returns (DeleteEndedSessionResponse);
  rpc SaveSessionWorld(SaveSessionWorldRequest) returns (SaveSessionWorldResponse);
  rpc PrepareSessionWorldDownload(PrepareSessionWorldDownloadRequest) returns (PrepareSessionWorldDownloadResponse);
  rpc InviteUser(InviteUserRequest) returns (InviteUserResponse);
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse);
  rpc UpdateSessionParameters(UpdateSessionParametersRequest) returns (UpdateSessionParametersResponse);
  rpc UpdateSessionExtraSettings(UpdateSessionExtraSettingsRequest) returns (UpdateSessionExtraSettingsResponse);
  rpc ListUsersInSession(ListUsersInSessionRequest) returns (ListUsersInSessionResponse);
  rpc KickUser(KickUserRequest) returns (KickUserResponse);
  rpc BanUser(BanUserRequest) returns (BanUserResponse);
  rpc IssueResoniteLinkConnection(IssueResoniteLinkConnectionRequest) returns (IssueResoniteLinkConnectionResponse);

  // 予約操作系
  rpc CreateScheduledSessionOperation(CreateScheduledSessionOperationRequest) returns (CreateScheduledSessionOperationResponse);
  rpc ListScheduledSessionOperations(ListScheduledSessionOperationsRequest) returns (ListScheduledSessionOperationsResponse);
  rpc CancelScheduledSessionOperation(CancelScheduledSessionOperationRequest) returns (CancelScheduledSessionOperationResponse);
}

message RefetchHeadlessAccountInfoRequest {
  string account_id = 1;
}

message RefetchHeadlessAccountInfoResponse {}

message UpdateHeadlessAccountIconRequest {
  string account_id = 1;
  bytes icon_data = 2; // 画像バイナリ (PNG, JPG, GIF, WebP)
}

message UpdateHeadlessAccountIconResponse {
  string new_icon_url = 1;
}

message GetHeadlessAccountStorageInfoRequest {
  string account_id = 1;
}

message GetHeadlessAccountStorageInfoResponse {
  int64 storage_quota_bytes = 1;
  int64 storage_used_bytes = 2;
}

message UpdateHeadlessAccountCredentialsRequest {
  string account_id = 1;
  string credential = 2; // email or userId
  string password = 3;
}

message UpdateHeadlessAccountCredentialsResponse {}

message DeleteHeadlessAccountRequest {
  string account_id = 1;
}

message DeleteHeadlessAccountResponse {}

message DeleteHeadlessHostRequest {
  string host_id = 1;
}

message DeleteHeadlessHostResponse {}

// ホストの過去のインスタンス一覧を取得
message ListHeadlessHostInstancesRequest {
  string host_id = 1;
}

message ListHeadlessHostInstancesResponse {
  message Instance {
    int32 instance_id = 1;
    google.protobuf.Timestamp first_log_at = 2;
    google.protobuf.Timestamp last_log_at = 3;
    int64 log_count = 4;
    bool is_current = 5;
  }
  repeated Instance instances = 1;
}

message AllowHostAccessRequest {
  string host_id = 1;
  headless.v1.AllowHostAccessRequest request = 2;
}

message AllowHostAccessResponse {}

message DenyHostAccessRequest {
  string host_id = 1;
  headless.v1.DenyHostAccessRequest request = 2;
}

message DenyHostAccessResponse {}

message StartHeadlessHostRequest {
  string name = 1;
  string headless_account_id = 2;
  optional string image_tag = 3;
  optional headless.v1.StartupConfig startup_config = 4;
  optional HeadlessHostAutoUpdatePolicy auto_update_policy = 5;
  optional string memo = 6;
  // 起動するホストの所属グループ. 未指定の場合は呼び出しユーザーの personal グループ.
  // 指定する場合は account の group_id と一致する必要がある (同一グループ制約).
  optional string group_id = 7;
}

message StartHeadlessHostResponse {
  reserved 1; // 旧: string host_id. 非同期 job 化に伴い job_id を返す.

  // 非同期 job の ID. クライアントは notification.JobCompletedEvent でこの ID を
  // 照合し、完了/失敗を toast 表示する.
  string job_id = 2;
}

message CreateHeadlessAccountRequest {
  reserved 1; // 廃止したプロパティ
  string credential = 2; // email or userId
  string password = 3;
  // 作成するアカウントの所属グループ. 未指定の場合は呼び出しユーザーの personal グループ.
  optional string group_id = 4;
}

message CreateHeadlessAccountResponse {}

message ListHeadlessAccountsRequest {
  PageRequest page = 1;
  // 指定したグループに所属するアカウントのみを返す.
  // 未指定の場合は呼び出しユーザーが account:read を持つグループ群に絞り込む.
  // system:group.list 保持者は未指定時に全件返却.
  optional string group_id = 2;
}

message ListHeadlessAccountsResponse {
  repeated HeadlessAccount accounts = 1;
  PageResponse page = 2;
}

message ListHeadlessHostImageTagsRequest {}

message ListHeadlessHostImageTagsResponse {
  message ContainerImage {
    string tag = 1;
    string resonite_version = 2;
    bool is_prerelease = 3;
    string app_version = 4;
  }
  repeated ContainerImage tags = 1;
}

message AcceptFriendRequestsRequest {
  reserved 1, 2;
  string headless_account_id = 3;
  string target_user_id = 4;
}

message AcceptFriendRequestsResponse {}

message GetFriendRequestsRequest {
  reserved 1;
  string headless_account_id = 2;
}

message GetFriendRequestsResponse {
  repeated UserInfo requested_contacts = 1;
}

message RestartHeadlessHostRequest {
  string host_id = 1;
  bool with_update = 2;
  optional string with_image_tag = 3;
  bool with_world_restart = 4;
  optional int32 timeout_seconds = 5;
}

message RestartHeadlessHostResponse {
  reserved 1; // 旧: optional string new_host_id. 非同期 job 化に伴い job_id を返す.

  string job_id = 2;
}

message UpdateHeadlessHostSettingsRequest {
  string host_id = 1;
  optional string name = 2;
  optional float tick_rate = 3;
  optional int32 max_concurrent_asset_transfers = 4;
  optional string username_override = 5;
  bool update_auto_spawn_items = 6;
  repeated string auto_spawn_items = 7;
  optional string universe_id = 8;
  optional HeadlessHostAutoUpdatePolicy auto_update_policy = 9;
}

message UpdateHeadlessHostSettingsResponse {}

message ShutdownHeadlessHostRequest {
  string host_id = 1;
}

message ShutdownHeadlessHostResponse {
  string job_id = 1;
}

message KillHeadlessHostRequest {
  string host_id = 1;
}

message KillHeadlessHostResponse {}

message GetHeadlessHostLogsRequest {
  string host_id = 1;

  // 既存フィールドを予約 (破壊的変更)
  reserved 2, 3, 4, 7, 8;

  // instance_id: 対象インスタンスID（過去のインスタンスのログも閲覧可能）
  int32 instance_id = 5;

  // 取得件数 (デフォルト100、最大1000)
  int32 limit = 6;

  // ページングカーソル (IDベース)
  oneof cursor {
    // 古いログを取得: このIDより小さいログ
    int64 before_id = 9;
    // 新しいログを取得: このIDより大きいログ
    int64 after_id = 10;
  }
}

message GetHeadlessHostLogsResponse {
  message Log {
    google.protobuf.Timestamp timestamp = 1;
    bool is_error = 2;
    string body = 3;
    int64 id = 4;
  }
  // 時系列に並んだログ
  repeated Log logs = 1;
  // より古いログが存在するか
  bool has_more_before = 2;
  // より新しいログが存在するか
  bool has_more_after = 3;
}

message SearchUserInfoRequest {
  string host_id = 1;
  headless.v1.SearchUserInfoRequest parameters = 2;
}

message KickUserRequest {
  string host_id = 1;
  headless.v1.KickUserRequest parameters = 2;
}

message KickUserResponse {}

message BanUserRequest {
  string host_id = 1;
  headless.v1.BanUserRequest parameters = 2;
}

message BanUserResponse {}

// ResoniteLink (WebSocket) 接続用の短期トークン付きパスを発行する。
// 返される ws_path は path + query のみ。クライアント (フロントエンド) は
// 現在の origin を補完して完全な ws[s]://host/path?token=... を組み立てる。
message IssueResoniteLinkConnectionRequest {
  string session_id = 1;
}

message IssueResoniteLinkConnectionResponse {
  string ws_path = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message FetchWorldInfoRequest {
  string host_id = 1;
  string url = 2;
}

message SearchWorldsRequest {
  string query = 1;
  bool featured_only = 2;
  int32 page_index = 3;
}

message SearchWorldsResponse {
  message WorldRecord {
    string id = 1;
    string owner_id = 2;
    string owner_name = 3;
    string name = 4;
    string description = 5;
    string thumbnail_url = 6;
    bool is_featured = 7;
  }
  repeated WorldRecord records = 1;
  bool has_more = 2;
}

message GetOwnWorldsRequest {
  string host_id = 1;
  int32 page_index = 2;
}

message GetOwnWorldsResponse {
  repeated SearchWorldsResponse.WorldRecord records = 1;
  bool has_more = 2;
}

message ListHeadlessHostRequest {
  PageRequest page = 1;
  // 指定したグループに所属するホストのみを返す.
  // 未指定の場合は呼び出しユーザーが host:read を持つグループ群に絞り込む.
  // system:group.list 保持者は未指定時に全件返却.
  optional string group_id = 2;
}

message ListHeadlessHostResponse {
  repeated HeadlessHost hosts = 1;
  PageResponse page = 2;
}

message GetHeadlessHostRequest {
  string host_id = 1;
}

message GetHeadlessHostResponse {
  reserved 2; // 廃止したプロパティ
  HeadlessHost host = 1;
}

message AddHeadlessHostRequest {
  string name = 1;
  string address = 2;
}

message AddHeadlessHostResponse {
  HeadlessHost host = 1;
}

message SearchSessionsRequest {
  message SearchParameters {
    optional string host_id = 1;
    optional SessionStatus status = 2;
    // 指定したグループに所属するセッションのみを返す.
    // 未指定の場合は呼び出しユーザーが session:read を持つグループ群に絞り込む.
    // system:group.list 保持者は未指定時に全件返却.
    optional string group_id = 3;
  }
  SearchParameters parameters = 1;
  PageRequest page = 2;
}

message SearchSessionsResponse {
  repeated Session sessions = 1;
  PageResponse page = 2;
}

message GetSessionDetailsRequest {
  string host_id = 1 [deprecated = true]; // 指定不要
  string session_id = 2;
}

message GetSessionDetailsResponse {
  Session session = 1;
}

message StartWorldRequest {
  string host_id = 1;
  headless.v1.WorldStartupParameters parameters = 2;
  string memo = 3;
  // 起動するセッションの所属グループ. 未指定の場合は呼び出しユーザーの personal グループ.
  // 指定する場合は host / account の group_id と一致する必要がある (同一グループ制約).
  optional string group_id = 4;
}

message StartWorldResponse {
  reserved 1; // 旧: Session opened_session. 非同期 job 化に伴い job_id を返す.

  string job_id = 2;
}

message StopSessionRequest {
  string host_id = 1 [deprecated = true]; // 指定不要
  string session_id = 2;
}

message StopSessionResponse {
  string job_id = 1;
}

message DeleteEndedSessionRequest {
  string session_id = 1;
}

message DeleteEndedSessionResponse {}

message SaveSessionWorldRequest {
  enum SaveMode {
    SAVE_MODE_UNKNOWN = 0;
    SAVE_MODE_OVERWRITE = 1;
    SAVE_MODE_SAVE_AS = 2;
    SAVE_MODE_COPY = 3;
  }
  string host_id = 1 [deprecated = true]; // 指定不要
  string session_id = 2;
  SaveMode save_mode = 3;
}

message SaveSessionWorldResponse {
  optional string saved_record_url = 1;
}

message PrepareSessionWorldDownloadRequest {
  string session_id = 1;
  headless.v1.WorldBinaryFormat format = 2;
}

message PrepareSessionWorldDownloadResponse {
  // ブラウザがそのままアクセス可能な相対 URL: /blobs/<uuid>
  string download_url = 1;
  // 推奨ファイル名 (ブラウザの Content-Disposition でも提供されるが、UI 表示用にも返す)
  string filename = 2;
}

message InviteUserRequest {
  string host_id = 1;
  string session_id = 2;
  oneof user {
    string user_id = 3;
    string user_name = 4;
  }
}

message InviteUserResponse {}

message UpdateUserRoleRequest {
  string host_id = 1;
  headless.v1.UpdateUserRoleRequest parameters = 2;
}

message UpdateUserRoleResponse {
  string role = 1;
}

message UpdateSessionParametersRequest {
  string host_id = 1;
  headless.v1.UpdateSessionParametersRequest parameters = 2;
}

message UpdateSessionParametersResponse {}

message UpdateSessionExtraSettingsRequest {
  string session_id = 1;
  optional bool auto_upgrade = 2;
  optional string memo = 3;
}

message UpdateSessionExtraSettingsResponse {}

message ListUsersInSessionRequest {
  string host_id = 1;
  string session_id = 2;
}

message ListUsersInSessionResponse {
  repeated headless.v1.UserInSession users = 1;
}

// 共通ページングメッセージ
// page_index は 0 始まり。page_size 未指定 (=0) はサーバー側でデフォルト値が適用される。
// 短時間で行の追加/削除が発生するとページ境界で重複/欠落が起こりうる (page_index ベース固有)。
message PageRequest {
  int32 page_index = 1;
  int32 page_size = 2;
}

// total_count は全体件数。
// page_index / page_size はサーバーがバリデーション・クランプ・デフォルト適用後に実際に使用した値。
// クライアントは UI 状態の同期に利用できる。
message PageResponse {
  int32 total_count = 1;
  int32 page_index = 2;
  int32 page_size = 3;
}

// models

enum HeadlessHostStatus {
  HEADLESS_HOST_STATUS_UNKNOWN = 0;
  HEADLESS_HOST_STATUS_STARTING = 1;
  HEADLESS_HOST_STATUS_RUNNING = 2;
  HEADLESS_HOST_STATUS_STOPPING = 3;
  HEADLESS_HOST_STATUS_EXITED = 4;
  HEADLESS_HOST_STATUS_CRASHED = 5;
}

enum SessionStatus {
  SESSION_STATUS_UNKNOWN = 0;
  SESSION_STATUS_STARTING = 1;
  SESSION_STATUS_RUNNING = 2;
  SESSION_STATUS_ENDED = 3;
  SESSION_STATUS_CRASHED = 4;
}

enum HeadlessHostAutoUpdatePolicy {
  HEADLESS_HOST_AUTO_UPDATE_POLICY_UNKNOWN = 0;
  HEADLESS_HOST_AUTO_UPDATE_POLICY_NEVER = 1; // 自動更新しない
  HEADLESS_HOST_AUTO_UPDATE_POLICY_USERS_EMPTY = 2; // ユーザがいない場合のみ自動更新する
}

message HeadlessHostSettings {
  optional string universe_id = 1;
  float tick_rate = 2;
  int32 max_concurrent_asset_transfers = 3;
  optional string username_override = 4;
  repeated headless.v1.AllowedAccessEntry allowed_url_hosts = 5;
  repeated string auto_spawn_items = 6;
}

message HeadlessHost {
  reserved 8, 9; // 廃止したプロパティ
  string id = 1;
  string name = 2;
  string resonite_version = 4;
  string app_version = 11;
  string account_id = 5;
  string account_name = 6;
  float fps = 7;
  HeadlessHostStatus status = 10;
  HeadlessHostAutoUpdatePolicy auto_update_policy = 12;
  string memo = 13;
  HeadlessHostSettings host_settings = 14;
  int32 instance_id = 15;
  // 所属グループ ID. 権限判定の基準となる.
  string group_id = 16;
  // 作成者 user_id. 権限とは独立した記録用途.
  // ユーザー削除等で参照先が消えうるため nullable.
  optional string created_by = 17;
}

message Session {
  string id = 1;
  string name = 2;
  string host_id = 3;
  SessionStatus status = 4;
  google.protobuf.Timestamp started_at = 5;
  optional google.protobuf.Timestamp ended_at = 6;
  headless.v1.WorldStartupParameters startup_parameters = 7;
  optional headless.v1.Session current_state = 8;
  // 旧: 作成者 user_id. 権限システム導入に伴い created_by に統合.
  // 移行期間中は created_by と同値を返す.
  optional string owner_id = 9 [deprecated = true];
  bool auto_upgrade = 10;
  string memo = 11;
  // 所属グループ ID. 権限判定の基準となる.
  // host.group_id == account.group_id == session.group_id (同一グループ制約).
  string group_id = 12;
  // 作成者 user_id. 権限とは独立した記録用途.
  optional string created_by = 13;
}

message HeadlessAccount {
  string user_id = 1;
  string user_name = 2;
  string icon_url = 3;
  // 所属グループ ID. 権限判定の基準となる.
  string group_id = 4;
  // 作成者 user_id. 権限とは独立した記録用途.
  // 既存データは nullable, 新規作成時は呼び出しユーザーが入る.
  optional string created_by = 5;
}

message UserInfo {
  string id = 1;
  string name = 2;
  string icon_url = 3;
}

message GetResoniteUserRequest {
  string resonite_id = 1;
}

message GetResoniteUserResponse {
  string id = 1;
  string name = 2;
  string icon_url = 3;
}

// コンタクト・チャット系メッセージ
message ListContactsRequest {
  string headless_account_id = 1;
  int32 limit = 2;
  optional string cursor = 3;
}

message ListContactsResponse {
  repeated UserInfo contacts = 1;
  optional string next_cursor = 2;
}

message GetContactMessagesRequest {
  string headless_account_id = 1;
  string contact_user_id = 2;
  int32 limit = 3;
  optional string before_id = 4;
  optional string after_id = 5;
}

message GetContactMessagesResponse {
  repeated ContactMessage messages = 1;
  bool has_more_before = 2;
  bool has_more_after = 3;
}

message ContactMessage {
  string id = 1;
  headless.v1.ContactChatMessageType type = 2;
  string content = 3;
  google.protobuf.Timestamp send_time = 4;
  optional google.protobuf.Timestamp read_time = 5;
  bool is_own_message = 6;
}

message SendContactMessageRequest {
  string headless_account_id = 1;
  string contact_user_id = 2;
  string message = 3;
}

message SendContactMessageResponse {}

// 予約操作系メッセージ

enum ScheduledOperationStatus {
  SCHEDULED_OPERATION_STATUS_UNSPECIFIED = 0;
  SCHEDULED_OPERATION_STATUS_PENDING = 1;
  SCHEDULED_OPERATION_STATUS_RUNNING = 2;
  SCHEDULED_OPERATION_STATUS_SUCCEEDED = 3;
  SCHEDULED_OPERATION_STATUS_FAILED = 4;
  SCHEDULED_OPERATION_STATUS_CANCELED = 5;
}

// 予約する操作.
message ScheduledOperation {
  oneof operation {
    StartWorldRequest start_session = 1;
    StopSessionRequest stop_session = 2;
    UpdateSessionParametersRequest update_parameters = 3;
    UpdateSessionExtraSettingsRequest update_extra_settings = 4;
  }
}

// 発火条件.
message ScheduledTrigger {
  oneof trigger {
    TimeTrigger time = 1;
    SessionUserCountTrigger session_user_count = 2;
  }
}

message TimeTrigger {
  google.protobuf.Timestamp scheduled_at = 1;
}

// セッションのユーザー数が閾値を満たした際に発火するトリガー.
// SessionStateCache が保持する current_state.users_count を監視する.
// session が cache に存在しない (=未起動 / 既終了) 場合は発火しない.
message SessionUserCountTrigger {
  enum Comparator {
    COMPARATOR_UNSPECIFIED = 0;
    COMPARATOR_LESS_OR_EQUAL = 1; // users_count <= threshold で発火
    COMPARATOR_GREATER_OR_EQUAL = 2; // users_count >= threshold で発火
  }
  string session_id = 1;
  Comparator comparator = 2;
  int32 threshold = 3;
}

message ScheduledSessionOperation {
  string id = 1;
  ScheduledOperation operation = 2;
  ScheduledTrigger trigger = 3;
  google.protobuf.Timestamp next_fire_at = 4;
  optional string host_id = 5;
  optional string session_id = 6;
  ScheduledOperationStatus status = 7;
  optional string last_error = 8;
  optional google.protobuf.Timestamp executed_at = 9;
  optional string created_by = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message CreateScheduledSessionOperationRequest {
  ScheduledOperation operation = 1;
  ScheduledTrigger trigger = 2;
}

message CreateScheduledSessionOperationResponse {
  ScheduledSessionOperation scheduled_operation = 1;
}

message ListScheduledSessionOperationsRequest {
  optional string session_id = 1;
  optional string host_id = 2;
  optional ScheduledOperationStatus status = 3;
  PageRequest page = 4;
}

message ListScheduledSessionOperationsResponse {
  repeated ScheduledSessionOperation scheduled_operations = 1;
  PageResponse page = 2;
}

message CancelScheduledSessionOperationRequest {
  string id = 1;
}

message CancelScheduledSessionOperationResponse {}
